{% extends "base.html" %}
{% block content %}
<div class="panel">
  <div class="d-flex justify-content-between align-items-start mb-3">
    <div>
      <h2 class="h5 mb-1">{{ product.name }}</h2>
      <div class="text-muted">{{ product.sku }}{% if product.barcode %} / {{ product.barcode }}{% endif %}</div>
    </div>
    <button class="btn btn-outline-primary" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
  </div>
  <div class="border rounded p-4 d-inline-block text-center">
    <img alt="QR code for {{ product.sku }}" src="data:image/png;base64,{{ qr_data }}" width="220" height="220">
    <div class="fw-semibold mt-2">{{ product.sku }}</div>
    <div>{{ product.name }}</div>
  </div>
</div>
{% endblock %}
