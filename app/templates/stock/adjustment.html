{% extends "base.html" %}
{% block content %}
<form class="panel" method="post" novalidate>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-grid">
    <div><label class="form-label">No</label><input class="form-control" name="adjustment_no" value="{{ adjustment_no }}"></div>
    <div><label class="form-label">Date</label><input class="form-control" type="date" name="adjustment_date" value="{{ today }}" required></div>
    <div><label class="form-label">Warehouse</label><select class="form-select" name="warehouse_id" required>{% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">Adjustment Type</label><select class="form-select" name="adjustment_type">{% for typ in adjustment_types %}<option value="{{ typ }}">{{ typ }}</option>{% endfor %}</select></div>
    <div class="full"><label class="form-label">Reason</label><input class="form-control" name="reason" required></div>
  </div>
  <hr>
  <div id="adjustment-lines">
    <div class="row g-2 adjustment-line">
      <div class="col-md-5"><select class="form-select" name="product_id[]" required>{% for p in products %}<option value="{{ p.id }}">{{ p.sku }} - {{ p.name }}</option>{% endfor %}</select></div>
      <div class="col-md-2"><input class="form-control" name="qty_in[]" type="number" step="0.001" min="0" placeholder="Qty In"></div>
      <div class="col-md-2"><input class="form-control" name="qty_out[]" type="number" step="0.001" min="0" placeholder="Qty Out"></div>
      <div class="col-md-2"><input class="form-control" name="rate[]" type="number" step="0.0001" min="0" placeholder="Rate"></div>
    </div>
  </div>
  <div class="mt-3 d-flex gap-2">
    <button class="btn btn-outline-secondary" type="button" id="add-adjustment-line">Line</button>
    <button class="btn btn-primary">Post Adjustment</button>
  </div>
</form>
{% endblock %}
{% block scripts %}
<script>
document.getElementById("add-adjustment-line")?.addEventListener("click", () => {
  const line = document.querySelector(".adjustment-line").cloneNode(true);
  line.querySelectorAll("input").forEach((input) => input.value = "");
  document.getElementById("adjustment-lines").appendChild(line);
});
</script>
{% endblock %}
