{% extends "base.html" %}{% block content %}<form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="form-grid"><div><label class="form-label">No</label><input class="form-control" name="adjustment_no" value="{{ adjustment_no }}"></div><div><label class="form-label">Date</label><input class="form-control" type="date" name="adjustment_date" value="{{ today }}"></div><div><label class="form-label">Warehouse</label><select class="form-select" name="warehouse_id">{% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}</select></div><div><label class="form-label">Reason</label><input class="form-control" name="reason" required></div></div><hr><div class="row g-2"><div class="col"><select class="form-select" name="product_id[]">{% for p in products %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}</select></div><div class="col"><input class="form-control" name="qty_in[]" placeholder="Qty In"></div><div class="col"><input class="form-control" name="qty_out[]" placeholder="Qty Out"></div><div class="col"><input class="form-control" name="rate[]" placeholder="Rate"></div></div><button class="btn btn-primary mt-3">Save</button></form>{% endblock %}
