{% extends "base.html" %}
{% block content %}
<form class="panel" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-grid">
    <div><label class="form-label">No</label><input class="form-control" name="transfer_no" value="{{ transfer_no }}"></div>
    <div><label class="form-label">Date</label><input class="form-control" type="date" name="transfer_date" value="{{ today }}" required></div>
    <div><label class="form-label">From Warehouse</label><select class="form-select" name="from_warehouse_id" required>{% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">To Warehouse</label><select class="form-select" name="to_warehouse_id" required>{% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">Status</label><select class="form-select" name="status"><option>Draft</option><option>Sent</option><option>Received</option></select></div>
    <div class="full"><label class="form-label">Notes</label><textarea class="form-control" name="notes"></textarea></div>
  </div>
  <hr>
  <div id="transfer-lines">
    <div class="row g-2 transfer-line">
      <div class="col-md-6"><select class="form-select" name="product_id[]" required>{% for p in products %}<option value="{{ p.id }}">{{ p.sku }} - {{ p.name }}</option>{% endfor %}</select></div>
      <div class="col-md-3"><input class="form-control" name="quantity[]" type="number" step="0.001" min="0.001" placeholder="Quantity" required></div>
      <div class="col-md-3"><input class="form-control" name="rate[]" type="number" step="0.0001" placeholder="Rate"></div>
    </div>
  </div>
  <div class="mt-3 d-flex gap-2">
    <button class="btn btn-outline-secondary" type="button" id="add-transfer-line"><i class="bi bi-plus-lg"></i> Line</button>
    <button class="btn btn-primary">Save Transfer</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('stock.transfers') }}">Cancel</a>
  </div>
</form>
{% endblock %}
{% block scripts %}
<script>
document.getElementById("add-transfer-line").addEventListener("click", () => {
  const container = document.getElementById("transfer-lines");
  const line = container.querySelector(".transfer-line").cloneNode(true);
  line.querySelectorAll("input").forEach((input) => input.value = "");
  container.appendChild(line);
});
</script>
{% endblock %}
