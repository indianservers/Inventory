{% extends "base.html" %}
{% block auth_content %}
<div class="auth-page">
  <form method="post" class="auth-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <h1 class="h3 fw-bold mb-1">Vyapara ERP</h1>
    <p class="text-muted mb-4">Sign in to manage your business.</p>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input class="form-control" type="email" name="email" value="admin@example.com" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" name="password" required>
    </div>
    <button class="btn btn-primary w-100" type="submit">Login</button>
    <a class="d-block mt-3" href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
  </form>
</div>
{% endblock %}
