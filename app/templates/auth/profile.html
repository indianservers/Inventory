{% extends "base.html" %}
{% block content %}
<div class="row g-3">
  <div class="col-lg-6">
    <form class="panel" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <h2 class="h5">Profile</h2>
      <label class="form-label">Name</label><input class="form-control mb-3" name="name" value="{{ current_user.name }}" required>
      <label class="form-label">Phone</label><input class="form-control mb-3" name="phone" value="{{ current_user.phone or '' }}">
      <button class="btn btn-primary">Save</button>
    </form>
  </div>
  <div class="col-lg-6">
    <form class="panel" method="post" action="{{ url_for('auth.change_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <h2 class="h5">Change Password</h2>
      <input class="form-control mb-3" type="password" name="current_password" placeholder="Current password" required>
      <input class="form-control mb-3" type="password" name="new_password" placeholder="New password" required>
      <button class="btn btn-outline-primary">Update password</button>
    </form>
  </div>
</div>
{% endblock %}
