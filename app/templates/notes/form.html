{% extends "base.html" %}{% block content %}<form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="form-grid"><div><label class="form-label">No</label><input class="form-control" name="{{ 'cn_no' if kind=='credit' else 'dn_no' }}" value="{{ number }}"></div><div><label class="form-label">Date</label><input class="form-control" type="date" name="{{ 'cn_date' if kind=='credit' else 'dn_date' }}" value="{{ today }}"></div>{% if kind=='credit' %}<div><label class="form-label">Customer</label><select class="form-select" name="customer_id">{% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div><div><label class="form-label">Sale</label><select class="form-select" name="sale_id"><option value="">None</option>{% for s in sales %}<option value="{{ s.id }}">{{ s.invoice_no }}</option>{% endfor %}</select></div>{% else %}<div><label class="form-label">Supplier</label><select class="form-select" name="supplier_id">{% for s in suppliers %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></div><div><label class="form-label">Purchase</label><select class="form-select" name="purchase_id"><option value="">None</option>{% for p in purchases %}<option value="{{ p.id }}">{{ p.purchase_no }}</option>{% endfor %}</select></div>{% endif %}<div><label class="form-label">Adjustment</label><select class="form-select" name="adjustment_type"><option>Return</option><option>Price</option><option>Other</option></select></div></div><hr><div id="items">{% for n in range(3) %}<div class="row g-2 mb-2"><div class="col"><select class="form-select" name="product_id[]"><option value="">Product</option>{% for p in products %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}</select></div><div class="col"><input class="form-control" name="quantity[]" placeholder="Qty"></div><div class="col"><input class="form-control" name="rate[]" placeholder="Rate"></div><div class="col"><input class="form-control" name="tax_rate[]" placeholder="Tax %"></div></div>{% endfor %}</div><label class="form-label">Reason</label><textarea class="form-control" name="reason"></textarea><button class="btn btn-primary mt-3">Issue</button></form>{% endblock %}
