{% extends "base.html" %}
{% block content %}
<div class="row g-3">
  <div class="col-lg-5">
    <div class="panel h-100">
      <h2 class="h5">Manual Backup</h2>
      <p class="text-muted">Download uploaded files backup. The MySQL dump helper is available in the service layer for server environments with mysqldump.</p>
      <a class="btn btn-primary" href="{{ url_for('settings.backup_upload_files') }}"><i class="bi bi-download"></i> Backup Uploads</a>
    </div>
  </div>
  <div class="col-lg-7">
    <form class="panel h-100" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <h2 class="h5">Automatic Backup Schedule</h2>
      <div class="form-grid">
        <label class="form-check full"><input class="form-check-input" type="checkbox" name="backup_schedule_enabled" {% if settings.get('backup_schedule_enabled') == '1' %}checked{% endif %}> Enable scheduled backups</label>
        <div><label class="form-label">Frequency</label><select class="form-select" name="backup_frequency"><option value="daily" {% if settings.get('backup_frequency') == 'daily' %}selected{% endif %}>Daily</option><option value="weekly" {% if settings.get('backup_frequency') == 'weekly' %}selected{% endif %}>Weekly</option><option value="monthly" {% if settings.get('backup_frequency') == 'monthly' %}selected{% endif %}>Monthly</option></select></div>
        <div><label class="form-label">Run Time</label><input class="form-control" type="time" name="backup_time" value="{{ settings.get('backup_time', '02:00') }}"></div>
        <div><label class="form-label">Retention Days</label><input class="form-control" type="number" name="backup_retention_days" value="{{ settings.get('backup_retention_days', '30') }}"></div>
      </div>
      <button class="btn btn-primary mt-3"><i class="bi bi-save"></i> Save Schedule</button>
    </form>
  </div>
</div>
{% endblock %}
