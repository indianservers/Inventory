{% extends "base.html" %}{% block content %}<div class="panel"><table class="table datatable"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead><tbody>{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role.name }}</td><td>{{ 'Active' if u.is_active else 'Inactive' }}</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
