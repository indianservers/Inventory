{% extends "base.html" %}
{% block content %}
<div class="row g-3">
  <div class="col-lg-4">
    <form class="panel" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <h2 class="h6">Add / Update Currency</h2>
      <label class="form-label">Code</label><input class="form-control text-uppercase" name="code" maxlength="10" required>
      <label class="form-label mt-2">Name</label><input class="form-control" name="name" required>
      <label class="form-label mt-2">Symbol</label><input class="form-control" name="symbol">
      <label class="form-label mt-2">INR Exchange Rate</label><input class="form-control" type="number" step="0.000001" name="exchange_rate" value="1">
      <label class="form-check mt-3"><input class="form-check-input" type="checkbox" name="is_base"> Base currency</label>
      <label class="form-check"><input class="form-check-input" type="checkbox" name="auto_update"> Auto update</label>
      <button class="btn btn-primary mt-3">Save Currency</button>
    </form>
  </div>
  <div class="col-lg-8">
    <div class="panel">
      <div class="d-flex justify-content-between align-items-center mb-3"><h2 class="h6 mb-0">Currencies</h2><form method="post" action="{{ url_for('settings.update_currency_rates') }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-primary">Update Live Rates</button></form></div>
      <table class="table"><thead><tr><th>Code</th><th>Name</th><th>Rate vs INR</th><th>Base</th><th>Updated</th></tr></thead><tbody>{% for c in currencies %}<tr><td>{{ c.code }}</td><td>{{ c.name }}</td><td>{{ c.exchange_rate }}</td><td>{{ 'Yes' if c.is_base else '' }}</td><td>{{ c.last_updated or '' }}</td></tr>{% endfor %}</tbody></table>
    </div>
  </div>
</div>
{% endblock %}
