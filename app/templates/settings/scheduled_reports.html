{% extends "base.html" %}
{% block content %}
<div class="row g-3">
  <div class="col-lg-4">
    <form class="panel" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <h2 class="h6">Schedule Report</h2>
      <label class="form-label">Name</label><input class="form-control" name="name" required>
      <label class="form-label mt-2">Report Type</label><select class="form-select" name="report_type">{% for t in ['sales','purchases','outstanding','pl','stock'] %}<option value="{{ t }}">{{ t|upper }}</option>{% endfor %}</select>
      <label class="form-label mt-2">Frequency</label><select class="form-select" name="frequency"><option>Daily</option><option>Weekly</option><option>Monthly</option></select>
      <div class="row g-2 mt-1"><div class="col"><input class="form-control" name="day_of_week" type="number" min="0" max="6" placeholder="Weekday"></div><div class="col"><input class="form-control" name="day_of_month" type="number" min="1" max="31" placeholder="Month day"></div></div>
      <label class="form-label mt-2">Time</label><input class="form-control" type="time" name="time_of_day" value="09:00">
      <label class="form-label mt-2">Recipients</label><textarea class="form-control" name="recipient_emails" placeholder="one@example.com, two@example.com"></textarea>
      <label class="form-check mt-3"><input class="form-check-input" type="checkbox" name="is_active" checked> Active</label>
      <button class="btn btn-primary mt-3">Save Schedule</button>
    </form>
  </div>
  <div class="col-lg-8">
    <div class="panel">
      <div class="d-flex justify-content-between mb-3"><h2 class="h6">Scheduled Reports</h2><form method="post" action="{{ url_for('settings.scheduled_report_run_due') }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-primary">Run Due</button></form></div>
      <table class="table"><thead><tr><th>Name</th><th>Type</th><th>Frequency</th><th>Recipients</th><th>Last Sent</th><th></th></tr></thead><tbody>{% for report in reports %}<tr><td>{{ report.name }}</td><td>{{ report.report_type }}</td><td>{{ report.frequency }}</td><td>{{ report.recipient_emails }}</td><td>{{ report.last_sent_at or '' }}</td><td><form method="post" action="{{ url_for('settings.scheduled_report_run_now', id=report.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-success">Run Now</button></form></td></tr>{% endfor %}</tbody></table>
    </div>
  </div>
</div>
{% endblock %}
