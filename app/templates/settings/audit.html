{% extends "base.html" %}
{% block content %}
<div class="panel">
  <table class="table datatable align-middle">
    <thead><tr><th>Time</th><th>User</th><th>Action</th><th>Module</th><th>Record</th><th>IP</th></tr></thead>
    <tbody>{% for log in logs %}<tr>
      <td>{{ log.created_at }}</td>
      <td>{{ log.user.name if log.user else 'System' }}</td>
      <td>{{ log.action }}</td>
      <td>{{ log.module }}</td>
      <td>{{ log.record_id or '' }}</td>
      <td>{{ log.ip_address or '' }}</td>
    </tr>{% endfor %}</tbody>
  </table>
</div>
{% endblock %}
