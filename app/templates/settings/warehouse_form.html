{% extends "base.html" %}
{% block content %}
<form class="panel" method="post" style="max-width:760px" novalidate>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="d-flex justify-content-between align-items-center mb-3"><h2 class="h5 mb-0">Edit Warehouse</h2><a class="btn btn-outline-secondary" href="{{ url_for('settings.warehouses') }}">Back</a></div>
  <div class="form-grid">
    <div><label class="form-label">Warehouse Name</label><input class="form-control" name="name" value="{{ warehouse.name }}" required></div>
    <div><label class="form-label">Warehouse Code</label><input class="form-control" name="code" value="{{ warehouse.code }}" required maxlength="20"></div>
    <div><label class="form-label">Branch</label><select class="form-select" name="branch_id"><option value="">No branch</option>{% for branch in branches %}<option value="{{ branch.id }}" {% if warehouse.branch_id == branch.id %}selected{% endif %}>{{ branch.name }}</option>{% endfor %}</select></div>
    <div class="full"><label class="form-label">Address</label><textarea class="form-control" name="address" rows="2">{{ warehouse.address or '' }}</textarea></div>
    <div><label class="form-label">Contact Person</label><input class="form-control" name="contact_person" value="{{ warehouse.contact_person or '' }}"></div>
    <div><label class="form-label">Phone</label><input class="form-control" name="phone" type="tel" value="{{ warehouse.phone or '' }}"></div>
    <div><label class="form-label">Email</label><input class="form-control" name="email" type="email" value="{{ warehouse.email or '' }}"></div>
    <div class="full"><label class="form-check"><input class="form-check-input" type="checkbox" name="status" {% if warehouse.status %}checked{% endif %}> Active</label></div>
  </div>
  <button class="btn btn-primary mt-3">Save Warehouse</button>
</form>
{% endblock %}
