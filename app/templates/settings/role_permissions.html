{% extends "base.html" %}
{% block content %}
<form class="panel" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="d-flex justify-content-between mb-3">
    <h2 class="h5 mb-0">{{ role.name }}</h2>
    <button class="btn btn-primary"><i class="bi bi-save"></i> Save Permissions</button>
  </div>
  <table class="table datatable align-middle">
    <thead><tr><th>Module</th><th>Action</th><th>Description</th><th>Granted</th></tr></thead>
    <tbody>{% for permission in permissions %}<tr>
      <td>{{ permission.module }}</td>
      <td>{{ permission.action }}</td>
      <td>{{ permission.description or '' }}</td>
      <td><input class="form-check-input" type="checkbox" name="permission_id[]" value="{{ permission.id }}" {% if permission.id in granted %}checked{% endif %}></td>
    </tr>{% endfor %}</tbody>
  </table>
</form>
{% endblock %}
