{% extends "base.html" %}
{% block content %}
<div class="panel"><div class="d-flex flex-wrap gap-2 mb-3"><button class="btn btn-outline-secondary" onclick="window.print()"><i class="bi bi-printer"></i> Print Statement</button><a class="btn btn-outline-success" href="{{ request.path }}?export=xlsx"><i class="bi bi-file-earmark-excel"></i> Export Excel</a></div>
<table class="table datatable"><thead><tr><th>Date</th><th>Reference</th><th>Narration</th><th>Debit</th><th>Credit</th><th>Balance</th></tr></thead><tbody>{% for e in entries %}<tr><td>{{ e.date }}</td><td>{{ e.reference_no }}</td><td>{{ e.narration }}</td><td>{{ e.debit }}</td><td>{{ e.credit }}</td><td>{{ e.balance }}</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
