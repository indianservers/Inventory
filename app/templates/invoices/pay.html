{% extends "base.html" %}
{% block auth_content %}{% include "invoices/pay_content.html" %}{% endblock %}
{% block content %}{% include "invoices/pay_content.html" %}{% endblock %}
{% block scripts %}{% if key_id %}<script src="https://checkout.razorpay.com/v1/checkout.js"></script><script>
document.querySelector("#pay-now")?.addEventListener("click", async () => {
  const order = await fetch("{{ url_for('invoices.create_order', id=invoice.id) }}", {method:"POST", headers:{"X-CSRFToken":document.querySelector('meta[name="csrf-token"]').content}}).then(r=>r.json());
  if (order.error) return alert(order.error);
  new Razorpay({key:order.key_id, amount:order.amount, currency:order.currency, order_id:order.order_id, name:"{{ company.company_name if company else 'Vyapara ERP' }}", description:"Invoice {{ invoice.invoice_no }}", handler:function(resp){const f=document.createElement('form');f.method='post';f.action="{{ url_for('invoices.payment_callback', id=invoice.id) }}";f.innerHTML=`<input name="csrf_token" value="{{ csrf_token() }}"><input name="razorpay_order_id" value="${resp.razorpay_order_id}"><input name="razorpay_payment_id" value="${resp.razorpay_payment_id}"><input name="razorpay_signature" value="${resp.razorpay_signature}">`;document.body.appendChild(f);f.submit();}}).open();
});
</script>{% endif %}{% endblock %}
