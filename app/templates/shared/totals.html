<div class="row justify-content-end mt-3"><div class="col-lg-4 sticky-totals">
  <label class="form-label">Subtotal</label><input class="form-control mb-2" id="subtotal" name="subtotal" readonly>
  <label class="form-label">Discount</label><input class="form-control mb-2" id="discount_total" name="discount_total" readonly>
  <label class="form-label">Tax</label><input class="form-control mb-2" id="tax_total" name="tax_total" readonly>
  <label class="form-label">Shipping</label><input class="form-control mb-2" id="shipping_charges" name="shipping_charges" value="0" type="number" step="0.01">
  <label class="form-label">Other Charges</label><input class="form-control mb-2" id="other_charges" name="other_charges" value="0" type="number" step="0.01">
  <label class="form-label">Round Off</label><input class="form-control mb-2" id="round_off" name="round_off" value="0" type="number" step="0.01">
  <label class="form-label">Grand Total</label><input class="form-control mb-2" id="grand_total" name="grand_total" readonly>
  <label class="form-label">Paid Amount</label><div class="input-group mb-2"><input class="form-control" id="paid_amount" name="paid_amount" value="0" type="number" step="0.01"><button class="btn btn-outline-secondary" type="button" id="pay-full">Full</button></div>
  <label class="form-label">Balance</label><input class="form-control mb-2" id="balance_amount" name="balance_amount" readonly>
  <label class="form-label">Status</label><input class="form-control" id="payment_status" name="payment_status" readonly>
</div></div>
