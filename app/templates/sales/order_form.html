{% extends "base.html" %}
{% block content %}
<form class="panel" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-grid">
    <div><label class="form-label">Order No</label><input class="form-control" name="order_no" value="{{ order_no }}" required></div>
    <div><label class="form-label">Order Date</label><input class="form-control" type="date" name="order_date" value="{{ today }}" required></div>
    <div><label class="form-label">Expected Date</label><input class="form-control" type="date" name="expected_date"></div>
    <div><label class="form-label">Customer</label><select class="form-select" name="customer_id" required><option value="">Select</option>{% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">Warehouse</label><select class="form-select" name="warehouse_id" required><option value="">Select</option>{% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">Status</label><select class="form-select" name="status"><option>Draft</option><option>Confirmed</option></select></div>
  </div>
  <hr><div class="d-flex justify-content-between"><h2 class="h6">Items</h2><button class="btn btn-sm btn-outline-primary" id="add-row" type="button"><i class="bi bi-plus-lg"></i></button></div><div id="items" class="mt-2"></div>
  {% include "shared/totals.html" %}
  <label class="form-label mt-3">Notes</label><textarea class="form-control" name="notes"></textarea>
  <div class="sticky-actions d-flex justify-content-between align-items-center"><span class="text-muted">Backorders are flagged when stock is unavailable.</span><button class="btn btn-primary">Save Order</button></div>
</form>
{% endblock %}
{% block scripts %}<script src="{{ url_for('static', filename='js/invoice.js') }}"></script><script>document.addEventListener("DOMContentLoaded",()=>initInvoiceForm("sale"));</script>{% endblock %}
