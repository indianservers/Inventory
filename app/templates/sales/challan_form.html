{% extends "base.html" %}
{% block content %}
<form class="panel" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-grid">
    <div><label class="form-label">Challan No</label><input class="form-control" name="challan_no" value="{{ challan_no }}" required></div>
    <div><label class="form-label">Date</label><input class="form-control" type="date" name="challan_date" value="{{ today }}" required></div>
    <div><label class="form-label">Customer</label><select class="form-select" name="customer_id" required><option value="">Select</option>{% for x in customers %}<option value="{{ x.id }}">{{ x.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">Vehicle No</label><input class="form-control" name="vehicle_no"></div>
    <div><label class="form-label">Driver</label><input class="form-control" name="driver_name"></div>
    <div class="full"><label class="form-label">Delivery Address</label><textarea class="form-control" name="delivery_address"></textarea></div>
  </div>
  <hr>
  <div id="challan-lines">
    <div class="row g-2 challan-line mb-2">
      <div class="col-md-6"><select class="form-select" name="product_id[]" required><option value="">Product</option>{% for p in products %}<option value="{{ p.id }}">{{ p.sku }} - {{ p.name }}</option>{% endfor %}</select></div>
      <div class="col-md-2"><input class="form-control" type="number" step="0.001" name="quantity[]" value="1"></div>
      <div class="col-md-4"><input class="form-control" name="notes[]" placeholder="Line note"></div>
    </div>
  </div>
  <label class="form-label mt-3">Notes</label><textarea class="form-control" name="notes"></textarea>
  <div class="mt-3 d-flex gap-2"><button class="btn btn-outline-secondary" type="button" id="add-challan-line"><i class="bi bi-plus-lg"></i> Line</button><button class="btn btn-primary">Save Challan</button></div>
</form>
{% endblock %}
{% block scripts %}<script>document.getElementById("add-challan-line").addEventListener("click",()=>{const c=document.getElementById("challan-lines");const line=c.querySelector(".challan-line").cloneNode(true);line.querySelectorAll("input").forEach((i)=>i.value=i.name==="quantity[]"?"1":"");c.appendChild(line);});</script>{% endblock %}
