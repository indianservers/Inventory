{% extends "base.html" %}
{% block content %}
<div class="row g-3">
  <div class="col-lg-4">
    <form class="panel" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <h2 class="h5">Record Refund</h2>
      <input class="form-control mb-2" name="refund_no" value="{{ refund_no }}">
      <input class="form-control mb-2" type="date" name="refund_date" value="{{ today }}" required>
      <select class="form-select mb-2" name="customer_id" required>{% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select>
      <select class="form-select mb-2" name="credit_note_id"><option value="">Credit note optional</option>{% for n in credit_notes %}<option value="{{ n.id }}">{{ n.cn_no }} - {{ n.customer.name }}</option>{% endfor %}</select>
      <select class="form-select mb-2" name="sale_return_id"><option value="">Return optional</option>{% for r in returns %}<option value="{{ r.id }}">{{ r.return_no }}</option>{% endfor %}</select>
      <input class="form-control mb-2" name="amount" type="number" step="0.01" placeholder="Amount" required>
      <select class="form-select mb-2" name="refund_mode"><option>Cash</option><option>Bank</option><option>Card</option><option>UPI</option></select>
      <input class="form-control mb-2" name="reference_no" placeholder="Reference">
      <textarea class="form-control mb-2" name="notes" placeholder="Notes"></textarea>
      <button class="btn btn-primary">Save Refund</button>
    </form>
  </div>
  <div class="col-lg-8">
    <div class="panel"><table class="table datatable"><thead><tr><th>No</th><th>Date</th><th>Customer</th><th>Mode</th><th>Amount</th><th>Approval</th></tr></thead><tbody>{% for r in refunds %}<tr><td>{{ r.refund_no }}</td><td>{{ r.refund_date }}</td><td>{{ r.customer.name }}</td><td>{{ r.refund_mode }}</td><td>{{ r.amount }}</td><td>{{ r.approval_status }}</td></tr>{% endfor %}</tbody></table></div>
  </div>
</div>
{% endblock %}
