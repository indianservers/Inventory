{% extends "base.html" %}
{% block content %}
<form class="panel" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-grid">
    <div><label class="form-label">Invoice No</label><input class="form-control" name="invoice_no" value="{{ invoice_no }}" required></div>
    <div><label class="form-label">Date</label><input class="form-control" type="date" name="invoice_date" value="{{ today }}" required></div>
    <div><label class="form-label">Due Date</label><input class="form-control" type="date" name="due_date"></div>
    <div><label class="form-label">Customer</label><select class="form-select" name="customer_id" required><option value="">Select</option>{% for x in customers %}<option value="{{ x.id }}">{{ x.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">Warehouse</label><select class="form-select" name="warehouse_id" required><option value="">Select</option>{% for x in warehouses %}<option value="{{ x.id }}">{{ x.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">Currency</label><select class="form-select currency-select" name="currency_id"><option value="">INR</option>{% for c in currencies or [] %}<option value="{{ c.id }}" data-rate="{{ c.exchange_rate }}">{{ c.code }} - {{ c.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">Exchange Rate</label><input class="form-control" name="exchange_rate_snapshot" type="number" step="0.000001" value="1"></div>
    <div><label class="form-label">Sales Type</label><select class="form-select" name="sale_type"><option>Credit</option><option>Cash</option></select></div>
  </div>
  <hr><div class="d-flex justify-content-between"><h2 class="h6">Items</h2><button class="btn btn-sm btn-outline-primary" id="add-row" type="button"><i class="bi bi-plus-lg"></i></button></div><div id="items" class="mt-2"></div>
  {% include "shared/totals.html" %}
  <label class="form-label mt-3">Terms</label><textarea class="form-control" name="terms">{{ company.default_invoice_terms if company }}</textarea>
  <label class="form-label mt-3">Notes</label><textarea class="form-control" name="notes"></textarea>
  <div class="sticky-actions d-flex justify-content-between align-items-center"><span class="text-muted">Review totals before saving.</span><button class="btn btn-primary">Save Invoice</button></div>
</form>
{% endblock %}
{% block scripts %}<script src="{{ url_for('static', filename='js/invoice.js') }}"></script><script>document.addEventListener("DOMContentLoaded",()=>initInvoiceForm("sale"));</script>{% endblock %}
