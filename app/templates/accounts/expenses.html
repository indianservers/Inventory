{% extends "base.html" %}{% block content %}<div class="row g-3"><div class="col-lg-4"><form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><h2 class="h5">Expense</h2><input class="form-control mb-2" name="expense_no" value="{{ expense_no }}"><input class="form-control mb-2" type="date" name="expense_date" value="{{ today }}"><select class="form-select mb-2" name="category_id"><option value="">General</option>{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select><input class="form-control mb-2" name="amount" type="number" step="0.01" placeholder="Amount"><input class="form-control mb-2" name="tax_amount" type="number" step="0.01" placeholder="Tax"><input class="form-control mb-2" name="vendor_name" placeholder="Vendor"><textarea class="form-control mb-2" name="notes"></textarea><button class="btn btn-primary">Save</button></form></div><div class="col-lg-8"><div class="panel"><table class="table datatable"><thead><tr><th>No</th><th>Date</th><th>Vendor</th><th>Amount</th></tr></thead><tbody>{% for i in items %}<tr><td>{{ i.expense_no }}</td><td>{{ i.expense_date }}</td><td>{{ i.vendor_name }}</td><td>{{ i.amount }}</td></tr>{% endfor %}</tbody></table></div></div></div>{% endblock %}
