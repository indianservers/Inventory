{% extends "base.html" %}{% block content %}<div class="row g-3"><div class="col-lg-4"><form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><h2 class="h5">Make Payment</h2><input class="form-control mb-2" name="voucher_no" value="{{ voucher_no }}"><input class="form-control mb-2" type="date" name="voucher_date" value="{{ today }}"><select class="form-select mb-2" name="supplier_id"><option value="">Other</option>{% for s in suppliers %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select><input class="form-control mb-2" name="amount" type="number" step="0.01" placeholder="Amount"><select class="form-select mb-2" name="payment_mode"><option>Cash</option><option>Bank Transfer</option><option>UPI</option><option>Card</option><option>Cheque</option></select><input class="form-control mb-2" name="reference_no" placeholder="Reference"><textarea class="form-control mb-2" name="notes"></textarea><button class="btn btn-primary">Save</button></form></div><div class="col-lg-8"><div class="panel"><table class="table datatable"><thead><tr><th>No</th><th>Date</th><th>Supplier</th><th>Amount</th></tr></thead><tbody>{% for i in items %}<tr><td>{{ i.voucher_no }}</td><td>{{ i.voucher_date }}</td><td>{{ i.supplier.name if i.supplier }}</td><td>{{ i.amount }}</td></tr>{% endfor %}</tbody></table></div></div></div>{% endblock %}
