{% extends "base.html" %}{% block content %}<div class="row g-3"><div class="col-lg-4"><form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><h2 class="h5">Receive Payment</h2><input class="form-control mb-2" name="receipt_no" value="{{ receipt_no }}"><input class="form-control mb-2" type="date" name="receipt_date" value="{{ today }}"><select class="form-select mb-2" name="customer_id">{% for c in customers %}<option value="{{ c.id }}">{{ c.name }} - Due {{ c.outstanding }}</option>{% endfor %}</select><input class="form-control mb-2" name="amount" type="number" step="0.01" placeholder="Amount"><select class="form-select mb-2" name="payment_mode"><option>Cash</option><option>Bank Transfer</option><option>UPI</option><option>Card</option><option>Wallet</option><option>Cheque</option></select><select class="form-select mb-2" name="sale_id"><option value="">Advance / unallocated</option>{% for inv in invoices %}<option value="{{ inv.id }}">{{ inv.invoice_no }} - {{ inv.customer.name }} - Balance {{ inv.balance_amount }}</option>{% endfor %}</select><input class="form-control mb-2" name="reference_no" placeholder="Reference"><textarea class="form-control mb-2" name="notes"></textarea><button class="btn btn-primary">Save</button></form></div><div class="col-lg-8"><div class="panel"><table class="table datatable"><thead><tr><th>No</th><th>Date</th><th>Customer</th><th>Amount</th><th>Unallocated</th><th>Status</th><th></th></tr></thead><tbody>{% for i in items %}<tr><td>{{ i.receipt_no }}</td><td>{{ i.receipt_date }}</td><td>{{ i.customer.name }}</td><td>{{ i.amount }}</td><td>{{ i.unallocated_amount }}</td><td>{{ i.status }}</td><td><form class="d-inline-flex gap-1" method="post" action="{{ url_for('accounts.receipt_allocate', id=i.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><select class="form-select form-select-sm" name="sale_id" style="width:180px">{% for inv in invoices if inv.customer_id == i.customer_id %}<option value="{{ inv.id }}">{{ inv.invoice_no }}</option>{% endfor %}</select><input class="form-control form-control-sm" name="amount" type="number" step="0.01" value="{{ i.unallocated_amount }}" style="width:110px"><button class="btn btn-sm btn-outline-primary">Allocate</button></form><form class="d-inline" method="post" action="{{ url_for('accounts.receipt_reverse', id=i.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="reason" value="Manual reversal"><button class="btn btn-sm btn-outline-danger">Reverse</button></form></td></tr>{% endfor %}</tbody></table></div></div></div>{% endblock %}
