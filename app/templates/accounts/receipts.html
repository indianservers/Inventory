{% extends "base.html" %}{% block content %}<div class="row g-3"><div class="col-lg-4"><form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><h2 class="h5">Receive Payment</h2><input class="form-control mb-2" name="receipt_no" value="{{ receipt_no }}"><input class="form-control mb-2" type="date" name="receipt_date" value="{{ today }}"><select class="form-select mb-2" name="customer_id">{% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select><input class="form-control mb-2" name="amount" type="number" step="0.01" placeholder="Amount"><select class="form-select mb-2" name="payment_mode"><option>Cash</option><option>Bank Transfer</option><option>UPI</option><option>Card</option><option>Cheque</option></select><input class="form-control mb-2" name="reference_no" placeholder="Reference"><textarea class="form-control mb-2" name="notes"></textarea><button class="btn btn-primary">Save</button></form></div><div class="col-lg-8"><div class="panel"><table class="table datatable"><thead><tr><th>No</th><th>Date</th><th>Customer</th><th>Amount</th></tr></thead><tbody>{% for i in items %}<tr><td>{{ i.receipt_no }}</td><td>{{ i.receipt_date }}</td><td>{{ i.customer.name }}</td><td>{{ i.amount }}</td></tr>{% endfor %}</tbody></table></div></div></div>{% endblock %}
