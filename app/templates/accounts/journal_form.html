{% extends "base.html" %}{% block content %}<form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label class="form-label">Date</label><input class="form-control mb-3" type="date" name="entry_date" value="{{ today }}"><label class="form-label">Narration</label><input class="form-control mb-3" name="narration"><div id="journal-lines">{% for n in range(2) %}<div class="row g-2 mb-2"><div class="col"><select class="form-select" name="account_id[]"><option value="">Account</option>{% for a in accounts %}<option value="{{ a.id }}">{{ a.account_name }}</option>{% endfor %}</select></div><div class="col"><input class="form-control" name="debit[]" placeholder="Debit"></div><div class="col"><input class="form-control" name="credit[]" placeholder="Credit"></div></div>{% endfor %}</div><button class="btn btn-primary">Save</button></form>{% endblock %}
