{% extends "base.html" %}{% block content %}<div class="row g-3"><div class="col-lg-4"><form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><h2 class="h5">{{ price_list.name }}</h2><input class="form-control mb-2" name="name" value="{{ price_list.name }}" required><input class="form-control mb-2" name="discount_pct" type="number" step="0.01" value="{{ price_list.discount_pct }}"><input class="form-control mb-2" name="currency" value="{{ price_list.currency }}"><textarea class="form-control mb-2" name="description">{{ price_list.description or '' }}</textarea><label class="form-check mb-2"><input class="form-check-input" type="checkbox" name="is_default" {% if price_list.is_default %}checked{% endif %}> Default</label><label class="form-check mb-2"><input class="form-check-input" type="checkbox" name="status" {% if price_list.status %}checked{% endif %}> Active</label><button class="btn btn-primary">Save</button></form></div><div class="col-lg-8"><div class="panel"><form class="row g-2 mb-3" method="post" action="{{ url_for('price_lists.items', id=price_list.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="col"><select class="form-select" name="product_id">{% for p in products %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}</select></div><div class="col"><input class="form-control" name="sales_price" type="number" step="0.01" placeholder="Price"></div><div class="col"><input class="form-control" name="min_qty" type="number" step="0.001" value="1"></div><div class="col-auto"><button class="btn btn-primary">Add</button></div></form><table class="table"><thead><tr><th>Product</th><th>Price</th><th>Min Qty</th><th></th></tr></thead><tbody>{% for item in price_list.items %}<tr><td>{{ item.product.name }}</td><td>{{ item.sales_price }}</td><td>{{ item.min_qty }}</td><td><form method="post" action="{{ url_for('price_lists.items', id=price_list.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="delete_id" value="{{ item.id }}"><button class="btn btn-sm btn-outline-danger">Remove</button></form></td></tr>{% endfor %}</tbody></table></div></div></div>{% endblock %}
