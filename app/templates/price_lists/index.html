{% extends "base.html" %}{% block content %}<div class="row g-3"><div class="col-lg-4"><form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><h2 class="h5">New Price List</h2><input class="form-control mb-2" name="name" placeholder="Name" required><input class="form-control mb-2" name="discount_pct" type="number" step="0.01" placeholder="Discount %"><input class="form-control mb-2" name="currency" value="INR"><textarea class="form-control mb-2" name="description" placeholder="Description"></textarea><label class="form-check mb-2"><input class="form-check-input" type="checkbox" name="is_default"> Default</label><button class="btn btn-primary">Save</button></form></div><div class="col-lg-8"><div class="panel"><table class="table datatable"><thead><tr><th>Name</th><th>Discount</th><th>Currency</th><th>Status</th><th></th></tr></thead><tbody>{% for p in price_lists %}<tr><td>{{ p.name }}</td><td>{{ p.discount_pct }}</td><td>{{ p.currency }}</td><td>{{ 'Active' if p.status else 'Inactive' }}</td><td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('price_lists.edit', id=p.id) }}">Edit</a></td></tr>{% endfor %}</tbody></table></div></div></div>{% endblock %}
