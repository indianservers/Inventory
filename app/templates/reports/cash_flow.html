{% extends "base.html" %}
{% block content %}
<div class="panel">
  <div class="d-flex flex-wrap gap-2 mb-3"><button class="btn btn-outline-secondary" onclick="window.print()"><i class="bi bi-printer"></i> Print</button><a class="btn btn-outline-success" href="{{ url_for('reports.cash_flow', export='xlsx') }}"><i class="bi bi-file-earmark-excel"></i> Export Excel</a></div>
  <table class="table align-middle">
    <thead><tr><th>Activity</th><th class="text-end">Inflow</th><th class="text-end">Outflow</th></tr></thead>
    <tbody>{% for row in rows %}<tr><td>{{ row.label }}</td><td class="text-end">{{ "%.2f"|format(row.inflow) }}</td><td class="text-end">{{ "%.2f"|format(row.outflow) }}</td></tr>{% endfor %}</tbody>
    <tfoot><tr><th>Net Cash Flow</th><th colspan="2" class="text-end">{{ "%.2f"|format(net_cash) }}</th></tr></tfoot>
  </table>
</div>
{% endblock %}
