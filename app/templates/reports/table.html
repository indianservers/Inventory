{% extends "base.html" %}{% block content %}<div class="panel"><div class="d-flex flex-wrap gap-2 mb-3"><button class="btn btn-outline-secondary" onclick="window.print()"><i class="bi bi-printer"></i> Print</button><a class="btn btn-outline-success" href="{{ request.path }}?export=xlsx"><i class="bi bi-file-earmark-excel"></i> Export Excel</a></div><table class="table datatable"><thead><tr>{% for c in columns %}<th>{{ c|replace('_',' ')|title }}</th>{% endfor %}</tr></thead><tbody>{% for r in rows %}<tr>{% for c in columns %}<td>{{ r|attr(c) }}</td>{% endfor %}</tr>{% endfor %}</tbody></table></div>{% endblock %}
