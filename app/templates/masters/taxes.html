{% extends "base.html" %}
{% block content %}
<div class="row g-3">
  <div class="col-lg-4"><form class="panel" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><h2 class="h5">Add Tax</h2>
    <label class="form-label">Name</label><input class="form-control mb-3" name="name" required>
    <label class="form-label">Rate %</label><input class="form-control mb-3" name="rate" type="number" step="0.01" required>
    <label class="form-label">Type</label><select class="form-select mb-3" name="tax_type"><option>GST</option><option>VAT</option><option>Sales Tax</option><option>None</option></select>
    <label class="form-check mb-3"><input class="form-check-input" name="is_inclusive" type="checkbox"> Inclusive</label>
    <label class="form-check mb-3"><input class="form-check-input" name="status" type="checkbox" checked> Active</label><button class="btn btn-primary">Save</button></form></div>
  <div class="col-lg-8"><div class="panel"><table class="table datatable"><thead><tr><th>Name</th><th>Rate</th><th>Type</th><th>Status</th></tr></thead><tbody>{% for i in items %}<tr><td>{{ i.name }}</td><td>{{ i.rate }}</td><td>{{ i.tax_type }}</td><td>{{ 'Active' if i.status else 'Inactive' }}</td></tr>{% endfor %}</tbody></table></div></div>
</div>
{% endblock %}
