{% extends "base.html" %}{% block content %}<div class="panel"><table class="table datatable"><thead><tr><th>No</th><th>Opened</th><th>Closed</th><th>Sales</th><th>Cash</th><th>Card</th><th>UPI</th><th>Status</th></tr></thead><tbody>{% for s in sessions %}<tr><td>{{ s.session_no }}</td><td>{{ s.opened_at }}</td><td>{{ s.closed_at or '' }}</td><td>{{ s.total_sales }}</td><td>{{ s.total_cash }}</td><td>{{ s.total_card }}</td><td>{{ s.total_upi }}</td><td>{{ s.status }}</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
