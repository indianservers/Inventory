{% extends "base.html" %}
{% block content %}
<form class="panel" method="post" action="{{ url_for('pos.open_session') }}" style="max-width:520px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <h2 class="h5">Open POS Session</h2>
  <label class="form-label">Opening Cash</label><input class="form-control mb-3" name="opening_cash" type="number" step="0.01" value="0">
  <button class="btn btn-success btn-lg w-100">Open Terminal</button>
</form>
{% endblock %}
