{% extends "base.html" %}
{% block content %}
<div class="panel"><div class="d-flex flex-wrap justify-content-between gap-2 mb-3"><h2 class="h5">Purchase Invoices</h2><div class="d-flex gap-2"><a class="btn btn-outline-secondary" href="{{ url_for('purchases.returns') }}">Returns</a><a class="btn btn-primary" href="{{ url_for('purchases.create') }}"><i class="bi bi-plus-lg"></i> Purchase</a></div></div>
<table class="table datatable"><thead><tr><th>No</th><th>Date</th><th>Supplier</th><th>Total</th><th>Paid</th><th>Status</th><th></th></tr></thead><tbody>{% for p in purchases %}<tr><td>{{ p.purchase_no }}</td><td>{{ p.purchase_date }}</td><td>{{ p.supplier.name }}</td><td>{{ p.grand_total }}</td><td>{{ p.paid_amount }}</td><td>{{ p.payment_status }}</td><td class="table-actions"><a class="btn btn-sm btn-outline-secondary" href="{{ url_for('purchases.print_purchase', id=p.id) }}"><i class="bi bi-printer"></i></a><a class="btn btn-sm btn-outline-primary" href="{{ url_for('purchases.purchase_pdf', id=p.id) }}"><i class="bi bi-filetype-pdf"></i></a></td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
