{% extends "base.html" %}
{% block content %}
<form class="panel" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-grid">
    <div><label class="form-label">PO No</label><input class="form-control" name="po_no" value="{{ po_no }}" required></div>
    <div><label class="form-label">PO Date</label><input class="form-control" type="date" name="po_date" value="{{ today }}" required></div>
    <div><label class="form-label">Expected Date</label><input class="form-control" type="date" name="expected_date"></div>
    <div><label class="form-label">Supplier</label><select class="form-select" name="supplier_id" required><option value="">Select</option>{% for x in suppliers %}<option value="{{ x.id }}">{{ x.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">Warehouse</label><select class="form-select" name="warehouse_id" required><option value="">Select</option>{% for x in warehouses %}<option value="{{ x.id }}">{{ x.name }}</option>{% endfor %}</select></div>
  </div>
  <hr><div class="d-flex justify-content-between"><h2 class="h6">Items</h2><button class="btn btn-sm btn-outline-primary" id="add-row" type="button"><i class="bi bi-plus-lg"></i></button></div><div id="items" class="mt-2"></div>
  {% include "shared/totals.html" %}
  <label class="form-label mt-3">Terms</label><textarea class="form-control" name="terms"></textarea>
  <label class="form-label mt-3">Notes</label><textarea class="form-control" name="notes"></textarea>
  <div class="sticky-actions d-flex justify-content-between align-items-center"><a class="btn btn-outline-secondary" href="{{ url_for('purchase_orders.index') }}">Back</a><button class="btn btn-primary">Save Purchase Order</button></div>
</form>
{% endblock %}
{% block scripts %}<script src="{{ url_for('static', filename='js/invoice.js') }}"></script><script>document.addEventListener("DOMContentLoaded",()=>initInvoiceForm("purchase"));</script>{% endblock %}
