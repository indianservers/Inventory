{% extends "base.html" %}
{% block content %}
<form class="panel" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-grid">
    <div><label class="form-label">GRN No</label><input class="form-control" name="grn_no" value="{{ grn_no }}" required></div>
    <div><label class="form-label">Date</label><input class="form-control" type="date" name="grn_date" value="{{ today }}" required></div>
    <div><label class="form-label">Supplier</label><select class="form-select" name="supplier_id" required>{% for s in suppliers %}<option value="{{ s.id }}" {% if po and po.supplier_id == s.id %}selected{% endif %}>{{ s.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label">Warehouse</label><select class="form-select" name="warehouse_id" required>{% for w in warehouses %}<option value="{{ w.id }}" {% if po and po.warehouse_id == w.id %}selected{% endif %}>{{ w.name }}</option>{% endfor %}</select></div>
  </div>
  <hr>
  <table class="table align-middle">
    <thead><tr><th>Product</th><th>Expected</th><th>Received</th><th>Rate</th><th>Tax %</th><th>Batch</th><th>MFG</th><th>Expiry</th><th>Serials</th></tr></thead>
    <tbody>
    {% if po %}
      {% for item in po.items %}
      <tr><td>{{ item.product.name }}<input type="hidden" name="product_id[]" value="{{ item.product_id }}"><input type="hidden" name="po_item_id[]" value="{{ item.id }}"></td><td><input class="form-control" name="expected_qty[]" value="{{ item.quantity - item.received_qty }}" readonly></td><td><input class="form-control" name="received_qty[]" type="number" step="0.001" value="{{ item.quantity - item.received_qty }}"></td><td><input class="form-control" name="rate[]" value="{{ item.rate }}"></td><td><input class="form-control" name="tax_rate[]" value="{{ item.tax_rate }}"></td><td><input class="form-control" name="batch_no[]"></td><td><input class="form-control" type="date" name="manufacture_date[]"></td><td><input class="form-control" type="date" name="expiry_date[]"></td><td><input class="form-control" name="serial_numbers[]" placeholder="Comma separated"></td></tr>
      {% endfor %}
    {% else %}
      {% for n in range(5) %}
      <tr><td><select class="form-select" name="product_id[]"><option value="">Product</option>{% for p in products %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}</select><input type="hidden" name="po_item_id[]" value=""></td><td><input class="form-control" name="expected_qty[]" value="0"></td><td><input class="form-control" name="received_qty[]" type="number" step="0.001"></td><td><input class="form-control" name="rate[]" value="0"></td><td><input class="form-control" name="tax_rate[]" value="0"></td><td><input class="form-control" name="batch_no[]"></td><td><input class="form-control" type="date" name="manufacture_date[]"></td><td><input class="form-control" type="date" name="expiry_date[]"></td><td><input class="form-control" name="serial_numbers[]"></td></tr>
      {% endfor %}
    {% endif %}
    </tbody>
  </table>
  <label class="form-label">Notes</label><textarea class="form-control" name="notes"></textarea>
  <button class="btn btn-primary mt-3">Save GRN</button>
</form>
{% endblock %}
